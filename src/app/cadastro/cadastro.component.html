<div fxLayout="row" fxLayoutAlign="center">

    <div fxLayout="column" fxFlex="1000px">

        <form class="mt-60" #clientesFrm="ngForm" (ngSubmit)="salvar()">

            <mat-card>

                <mat-card-header>
                    <mat-card-title>Dados Pessoais</mat-card-title>
                </mat-card-header>

                <mat-card-content class="mt-20">

                    <div fxLayout="row" fxAlign="start" fxLayoutGap="16px">

                        <div fxLayout="Column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Nome: </mat-label>
                                <input type="text" [(ngModel)]="cliente.nome" name="nome" required
                                    placeholder="Ex: Leonardo Ramos" matInput>
                            </mat-form-field>
                        </div>

                    </div>

                    <div fxLayout="row" fxAlign="start" fxLayoutGap="16px">

                        <div fxLayout="Column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Email: </mat-label>
                                <input type="email" [(ngModel)]="cliente.email" name="email" required
                                    placeholder="Ex: leonardo@ramos.com" matInput>
                            </mat-form-field>
                        </div>

                    </div>

                    <div fxLayout="row" fxAlign="start" fxLayoutGap="16px">

                        <div fxLayout="Column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>CPF: </mat-label>
                                <input type="text" [(ngModel)]="cliente.cpf" name="cpf" required
                                    placeholder="Ex: 123.456.789-00" matInput>
                            </mat-form-field>
                        </div>

                    </div>

                    <div fxLayout="row" fxAlign="start" fxLayoutGap="16px">

                        <div fxLayout="Column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>Data de Nascimento: </mat-label>
                                <input type="date" [(ngModel)]="cliente.dataNascimento" name="dataNascimento" required
                                    placeholder="Ex: 01/01/1990" matInput>
                            </mat-form-field>

                        </div>

                    </div>

                    <mat-card-actions>

                        
                        @if(atualizando){
                            <button class="mr-20" mat-raised-button color="primary">
                                <mat-icon>refresh</mat-icon>
                                Atualizar
                            </button>
                        } @else{
                            <button class="mr-20" mat-raised-button color="primary" type="submit">
                            <mat-icon>save</mat-icon>
                            Salvar
                        </button>
                        }
                        <button class="mr-20" mat-flat-button color="primary">
                            <mat-icon>backspace</mat-icon>
                            Limpar
                        </button>

                        

                    </mat-card-actions>

                </mat-card-content>

            </mat-card>

        </form>

    </div>

</div>
